name: "Project Hydra: Infrastructure Dispatch (GCP)"

on:
  push:
    branches: [ "main" ]
    paths: [ "terraform/**", "resources/**" ]
  pull_request:
    branches: [ "main" ]
    paths: [ "terraform/**", "resources/**" ]
  workflow_dispatch:
    inputs:
      action:
        description: 'Operational Task'
        required: true
        default: 'plan'
        type: choice
        options:
        - plan
        - apply
        - redeploy_c2_node
        - destroy_ephemeral
        - full_burn

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write   # Required for GCP Workload Identity Federation
  contents: read    # Required for actions/checkout
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TF_ROOT: terraform/live/production
  TF_VERSION: 1.13.1
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  # Workload Identity Provider for GitHub Actions
  WIF_PROVIDER: ${{ secrets.GCP_WIF_PROVIDER }}
  WIF_SERVICE_ACCOUNT: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

jobs:
  lint-and-scan:
    name: "🛡️ Security & Linting"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -recursive -check
        working-directory: .

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: terraform/modules
          soft_fail: true

  terraform-plan:
    name: "📝 Terraform Plan"
    needs: lint-and-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_ROOT }}
        run: terraform init

      - name: Terraform Validate
        id: validate
        working-directory: ${{ env.TF_ROOT }}
        run: terraform validate -no-color

      # --- ADVANCED LOGIC: BYPASS SAFETY GUARDS ---
      - name: Disable Lifecycle Guard (Full Burn Only)
        if: github.event.inputs.action == 'full_burn'
        run: |
          sed -i 's/prevent_destroy = true/prevent_destroy = false/g' terraform/modules/gcp/storage/main.tf
          sed -i 's/force_destroy = false/force_destroy = true/g' terraform/modules/gcp/storage/main.tf
          sed -i 's/prevent_destroy = true/prevent_destroy = false/g' terraform/modules/gcp/kms/main.tf

      # --- SURGICAL LOGIC: RE-ROLLING MIG ---
      - name: Taint Resources (Redeploy)
        if: github.event.inputs.action == 'redeploy_c2_node'
        working-directory: ${{ env.TF_ROOT }}
        run: |
          # Tainting the Instance Template forces MIG to create new instances
          terraform taint module.autoscaling.google_compute_instance_template.c2_template || true

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_ROOT }}
        env:
          TF_VAR_my_ip: ${{ secrets.ADMIN_IP_CIDR }}
          TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          if [ "${{ github.event.inputs.action }}" == "destroy_ephemeral" ]; then
            # Target only compute/network, leaving Storage (GCS) and IAM intact
            terraform plan -destroy \
              -target=module.autoscaling \
              -target=module.load_balancing \
              -target=module.security \
              -out=tfplan
          elif [ "${{ github.event.inputs.action }}" == "full_burn" ]; then
            terraform plan -destroy -out=tfplan
          else
            terraform plan -out=tfplan
          fi

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.TF_ROOT }}/tfplan
          retention-days: 1
          overwrite: true

  terraform-apply:
    name: "🚀 Terraform Apply"
    needs: terraform-plan
    if: (github.ref == 'refs/heads/main' && github.event_name != 'pull_request') || (github.event_name == 'workflow_dispatch' && github.event.inputs.action != 'plan')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_ROOT }}
        run: terraform init -input=false -no-color

      # --- REPEAT SAFETY BYPASS FOR APPLY PHASE ---
      - name: Disable Lifecycle Guard (Full Burn Only)
        if: github.event.inputs.action == 'full_burn'
        run: |
          sed -i 's/prevent_destroy = true/prevent_destroy = false/g' terraform/modules/gcp/storage/main.tf
          sed -i 's/force_destroy = false/force_destroy = true/g' terraform/modules/gcp/storage/main.tf
          sed -i 's/prevent_destroy = true/prevent_destroy = false/g' terraform/modules/gcp/kms/main.tf

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.TF_ROOT }}

      - name: Terraform Apply
        working-directory: ${{ env.TF_ROOT }}
        env:
          TF_VAR_my_ip: ${{ secrets.ADMIN_IP_CIDR }}
          TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        run: terraform apply -auto-approve tfplan