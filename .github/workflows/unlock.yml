name: "Project Hydra: Administrative State Unlock"

on:
  workflow_dispatch:
    inputs:
      lock_id:
        description: 'The Lock ID (found in the "Error locking state" message)'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  TF_ROOT: terraform/live/production
  TF_VERSION: 1.13.1
  GCP_REGION: us-central1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WIF_PROVIDER: ${{ secrets.GCP_WIF_PROVIDER }}
  WIF_SERVICE_ACCOUNT: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

jobs:
  force-unlock:
    name: "🔓 Force Unlock State"
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_ROOT }}
        run: terraform init

      - name: Terraform Force Unlock
        working-directory: ${{ env.TF_ROOT }}
        run: terraform force-unlock -force ${{ github.event.inputs.lock_id }}

      - name: Status Update
        run: echo "State lock ${{ github.event.inputs.lock_id }} has been forcibly released. You may now resume standard deployments."